name: Sync GitHub to Gitee

on:
  push:
    branches: [ main, master ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout GitHub code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH for Gitee
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf 'Host gitee.com\n  StrictHostKeyChecking accept-new\n  ConnectTimeout 15\n  ServerAliveInterval 30\n' >> ~/.ssh/config

      - name: Sync to Gitee (with retry)
        run: |
          git remote add gitee git@gitee.com:yee01001100/java-quzi-build-by-maven.git
          for i in 1 2 3; do
            echo "=== Attempt $i / 3 ==="
            if git push --force --all gitee && git push --force --tags gitee; then
              echo "=== Sync OK ==="
              git ls-remote --heads gitee
              exit 0
            fi
            echo "=== Retrying in 10s... ==="
            sleep 10
          done
          echo "=== All 3 attempts failed ==="
          exit 1