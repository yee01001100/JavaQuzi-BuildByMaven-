name: Sync GitHub to Gitee

on:
  push:
    branches: [ main, master ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout GitHub code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH for Gitee
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa gitee.com >> ~/.ssh/known_hosts
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/gitee_key
          chmod 600 ~/.ssh/gitee_key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}

      - name: Force push all branches to Gitee
        run: |
          git remote add gitee git@gitee.com:yee01001100/java-quzi-build-by-maven.git
          GIT_SSH_COMMAND="ssh -i ~/.ssh/gitee_key -o StrictHostKeyChecking=yes" git push --force --all gitee
          GIT_SSH_COMMAND="ssh -i ~/.ssh/gitee_key -o StrictHostKeyChecking=yes" git push --force --tags gitee